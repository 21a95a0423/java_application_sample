name: Docker Build -> push -> Deploye

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-an-deploy:

    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: setup java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: give the permissions to mvnw
      run: chmod +x mvnw
    - name: Build jar
      run: ./mvnw clean package -DskipTests
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build docker image
      run: docker build -t ${{secrets.DOCKER_USERNAME}}/spring-boot-ci-demo:latest .
    - name: push image to docker Hub
      run: docker push ${{secrets.DOCKER_USERNAME}}/spring-boot-ci-demo:latest
    
    
    
